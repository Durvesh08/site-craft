services:
  - type: web
    name: sitecraft-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ── Database (auto-provisioned) ────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: sitecraft-db
          property: connectionString

      # ── Auth ──────────────────────────────────────────────────────────────
      - key: SESSION_SECRET
        generateValue: true
      - key: OIDC_CLIENT_ID
        sync: false
      - key: OIDC_CLIENT_SECRET
        sync: false
      - key: OIDC_ISSUER_URL
        sync: false

      # ── AI ────────────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false

      # ── Cloudflare R2 Image Storage (free) ────────────────────────────────
      # Get these from Cloudflare Dashboard → R2 → your bucket → Manage R2 API Tokens
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      # Enable Public Access on the bucket → copy the r2.dev URL here
      - key: R2_PUBLIC_URL
        sync: false

      # ── CORS ──────────────────────────────────────────────────────────────
      # Set to your Vercel URL, e.g. https://sitecraft.vercel.app
      - key: FRONTEND_URL
        sync: false

      # ── Encryption ────────────────────────────────────────────────────────
      - key: SETTINGS_ENCRYPTION_KEY
        generateValue: true

databases:
  - name: sitecraft-db
    plan: free
    region: oregon

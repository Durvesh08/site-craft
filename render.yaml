services:
  - type: web
    name: sitecraft-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # ── Database ──────────────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: sitecraft-db
          property: connectionString
      # ── Auth ─────────────────────────────────────────────────────────────
      - key: SESSION_SECRET
        generateValue: true
      - key: OIDC_CLIENT_ID
        sync: false          # set manually in Render dashboard
      - key: OIDC_CLIENT_SECRET
        sync: false
      - key: OIDC_ISSUER_URL
        sync: false
      # ── AI ────────────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard
      # ── Storage (AWS S3) ─────────────────────────────────────────────────
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        sync: false
      # ── Frontend URL (for CORS) ───────────────────────────────────────────
      - key: FRONTEND_URL
        sync: false          # set to your Vercel URL, e.g. https://sitecraft.vercel.app
      # ── Encryption ───────────────────────────────────────────────────────
      - key: SETTINGS_ENCRYPTION_KEY
        generateValue: true

databases:
  - name: sitecraft-db
    plan: free
    region: oregon

services:
  - type: web
    name: sitecraft-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm --filter @workspace/db run push-force && node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ── Database (Supabase) ────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false

      # ── Auth ──────────────────────────────────────────────────────────────
      - key: SESSION_SECRET
        generateValue: true
      - key: OIDC_CLIENT_ID
        sync: false
      - key: OIDC_CLIENT_SECRET
        sync: false
      - key: OIDC_ISSUER_URL
        sync: false

      # ── AI ────────────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false

      # ── Cloudflare R2 Image Storage (free) ────────────────────────────────
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false

      # ── CORS ──────────────────────────────────────────────────────────────
      - key: FRONTEND_URL
        sync: false

      # ── Encryption ────────────────────────────────────────────────────────
      - key: SETTINGS_ENCRYPTION_KEY
        generateValue: true
